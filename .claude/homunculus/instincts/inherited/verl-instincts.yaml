# Verl Workflow Bugfix Single Module

## Action

Follow the bugfix-single-module workflow:
1. Identify the problematic function or class in the relevant Python file.
2. Edit the file to fix the bug (e.g., add guard, initialize variable, write missing file).
3. Describe the bug, root cause, and fix in the commit message.
4. Optionally add or update a test if feasible.
5. Validate manually or via CI if possible.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~3x per month
- Files: verl/**/*.py

